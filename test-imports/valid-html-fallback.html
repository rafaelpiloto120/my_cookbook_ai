<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Skillet Chickpeas</title>
    <meta property="og:title" content="Skillet Chickpeas" />
  </head>
  <body>
    <h1>Skillet Chickpeas</h1>
    <ul>
      <li>1 can chickpeas</li>
      <li>1 tbsp olive oil</li>
      <li>1 tsp smoked paprika</li>
      <li>Salt to taste</li>
    </ul>
    <ol>
      <li>Drain and rinse the chickpeas.</li>
      <li>Warm oil in a skillet and add paprika.</li>
      <li>Add chickpeas and cook until lightly crisp.</li>
      <li>Season with salt and serve.</li>
    </ol>
  </body>
</html>
